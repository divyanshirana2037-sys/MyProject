<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VendorBridge ERP — Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231e56a8'/><path d='M8 10h16M8 16h10M8 22h13' stroke='white' stroke-width='2.5' stroke-linecap='round'/></svg>">
</head>
<body class="login-page">

  <!-- Background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Login Card -->
  <div class="login-card">

    <div class="logo-wrap">
      <!-- Circular company logo / avatar -->
      <div class="avatar-ring">
        <div class="avatar-inner">
          <!-- VendorBridge Logo Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
            <rect x="6" y="10" width="36" height="28" rx="4" stroke="rgba(255,255,255,.7)" stroke-width="2.5"/>
            <path d="M6 18h36" stroke="rgba(255,255,255,.7)" stroke-width="2.5"/>
            <path d="M14 26h6M14 32h10" stroke="rgba(255,255,255,.9)" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="34" cy="29" r="5" fill="rgba(14,165,233,.8)"/>
            <path d="M32 29l1.5 1.5 2.5-2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div>
        <div class="login-title">VendorBridge ERP</div>
        <div class="login-subtitle">Procurement &amp; Vendor Management</div>
      </div>
    </div>

    <form class="login-form" id="loginForm" novalidate>

      <!-- Username -->
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input
            id="username"
            type="text"
            class="form-control"
            placeholder="Enter your username"
            required
            autocomplete="username"
          >
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            id="password"
            type="password"
            class="form-control"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          >
          <button type="button" class="toggle-pass" aria-label="Toggle password">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Login Button -->
      <button type="submit" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Sign In to Dashboard
      </button>

    </form>

    <div class="login-footer">
      © 2025 VendorBridge ERP · All rights reserved
    </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
