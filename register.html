<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VendorBridge ERP — Complete Your Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231e56a8'/><path d='M8 10h16M8 16h10M8 22h13' stroke='white' stroke-width='2.5' stroke-linecap='round'/></svg>">
</head>
<body class="register-page">

  <div class="register-card">

    <!-- Header -->
    <div class="logo-wrap">
      <!-- Clickable circular profile image placeholder -->
      <div class="register-avatar-ring" onclick="document.getElementById('avatarInput').click()" title="Upload profile photo">
        <div class="register-avatar-inner" id="avatarPreview">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Upload Photo</span>
          <div class="avatar-overlay">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
              stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </div>
        </div>
      </div>
      <input type="file" id="avatarInput" accept="image/*" style="display:none">

      <div>
        <div class="register-title">Complete Your Profile</div>
        <div class="register-subtitle">Set up your VendorBridge ERP account</div>
      </div>
    </div>

    <!-- Form -->
    <form class="register-form" id="registerForm" novalidate>

      <!-- Personal Information -->
      <div>
        <div class="form-section-label">Personal Information</div>
      </div>

      <!-- First Name / Last Name -->
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input id="firstName" type="text" class="form-control" placeholder="Alex" required>
          </div>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input id="lastName" type="text" class="form-control" placeholder="Morgan" required>
          </div>
        </div>
      </div>

      <!-- Email / Phone -->
      <div class="form-row">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input id="email" type="email" class="form-control" placeholder="alex@company.com" required>
          </div>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </span>
            <input id="phone" type="tel" class="form-control" placeholder="+1 (555) 000-0000">
          </div>
        </div>
      </div>

      <!-- Role & Access -->
      <div>
        <div class="form-section-label">Role &amp; Access</div>
      </div>

      <!-- Role / Country -->
      <div class="form-row">
        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" class="form-control" required>
            <option value="" disabled selected>Select your role</option>
            <option value="Procurement Manager">Procurement Manager</option>
            <option value="Vendor Manager">Vendor Manager</option>
            <option value="Finance Officer">Finance Officer</option>
            <option value="Supply Chain Analyst">Supply Chain Analyst</option>
            <option value="Operations Director">Operations Director</option>
            <option value="Category Manager">Category Manager</option>
            <option value="Contract Specialist">Contract Specialist</option>
            <option value="Accounts Payable">Accounts Payable</option>
            <option value="Executive / C-Level">Executive / C-Level</option>
            <option value="System Administrator">System Administrator</option>
          </select>
        </div>
        <div class="form-group">
          <label for="country">Country</label>
          <select id="country" class="form-control" required>
            <option value="" disabled selected>Select country</option>
            <option value="US">United States</option>
            <option value="GB">United Kingdom</option>
            <option value="CA">Canada</option>
            <option value="AU">Australia</option>
            <option value="DE">Germany</option>
            <option value="FR">France</option>
            <option value="IN">India</option>
            <option value="SG">Singapore</option>
            <option value="AE">United Arab Emirates</option>
            <option value="JP">Japan</option>
            <option value="BR">Brazil</option>
            <option value="NL">Netherlands</option>
            <option value="SE">Sweden</option>
            <option value="CH">Switzerland</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <!-- Additional Info -->
      <div>
        <div class="form-section-label">Additional Information</div>
      </div>

      <div class="form-group">
        <label for="addInfo">Additional Information</label>
        <textarea
          id="addInfo"
          class="form-control"
          placeholder="Tell us about your organization, procurement goals, or any special requirements…"
          rows="4"
        ></textarea>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Create My Account &amp; Go to Dashboard
      </button>

    </form>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
